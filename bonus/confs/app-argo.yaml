apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rrhnizar-app-sample
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/root/argocd_app_rrhnizar.git
    path: manifests
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true